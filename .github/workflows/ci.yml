name: CI

on:
  push:
    # lint + generate tournent sur toutes les branches (test systématique).
    # Les tags semver stricts (vX.Y.Z) déclenchent en plus release et pages.
    # Les tags comme v1.0.0-alpha ou v1.0 sont exclus du pipeline release/pages.
    branches: ["**"]
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # -------------------------------------------------------------------------
  # Qualité du code source — lint et formatage avec ruff
  # -------------------------------------------------------------------------
  lint:
    name: Lint — ruff
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Configurer l'environnement conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: pboule
          conda-remove-defaults: "true"

      - name: Exécuter pre-commit (tous les fichiers)
        shell: bash -el {0}
        run: pre-commit run --all-files
        env:
          SKIP: no-commit-to-branch

  # -------------------------------------------------------------------------
  # Génération des documents — tests des scripts Python
  # (sans tectonic : pboule-pdf exclu car nécessite une cache LaTeX)
  # -------------------------------------------------------------------------
  generate:
    name: Génération des documents
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v5

      - name: Configurer l'environnement conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: pboule
          conda-remove-defaults: "true"

      - name: Calculer les caractéristiques des logos
        shell: bash -el {0}
        run: |
          python python/compute_logo_yaml.py \
            --logo-main     logo_COF_montlaur_rose.png \
            --logo-petanque logo_petanque.png \
            --logo-height   3.5 \
            --output        logo.yaml

      - name: Générer les feuilles de poule
        shell: bash -el {0}
        run: |
          mkdir -p documents
          python python/generate_feuille_poule.py \
            --teams-min  6 \
            --teams-max  32 \
            --pool-base  4 \
            --output     documents \
            --logo-yaml  logo.yaml

      - name: Générer la feuille d'inscription
        shell: bash -el {0}
        run: |
          python python/generate_feuille_inscription.py \
            --n-equipes 32 \
            --output    documents \
            --logo-yaml logo.yaml

      - name: Vérifier les fichiers produits
        shell: bash -el {0}
        run: |
          ls -lh documents/*.pdf
          test -f documents/feuille_inscription.pdf
          test -f documents/poule_A.pdf

      - name: Archiver les documents générés
        uses: actions/upload-artifact@v6
        with:
          name: documents-generes
          path: documents/
          retention-days: 7

  # -------------------------------------------------------------------------
  # Release GitHub — publie les documents PDF comme assets
  # Déclenché uniquement sur un tag semver strict (vX.Y.Z)
  # -------------------------------------------------------------------------
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: generate
    permissions:
      contents: write   # requis pour créer une GitHub Release

    steps:
      - uses: actions/checkout@v5

      - name: Configurer l'environnement conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: pboule
          conda-remove-defaults: "true"

      - name: Télécharger les documents générés
        uses: actions/download-artifact@v7
        with:
          name: documents-generes
          path: documents/

      - name: Créer une archive ZIP des documents
        run: |
          TAG="${{ github.ref_name }}"
          cd documents
          zip -r "../pboule-documents-${TAG}.zip" ./*.pdf
          cd ..
          ls -lh pboule-documents-*.zip

      - name: Extraire les notes de release depuis CHANGELOG.md
        shell: bash -el {0}
        run: |
          python python/extract_changelog.py "${{ github.ref_name }}" \
            > /tmp/release_notes.md
          echo "--- Notes de release ---"
          cat /tmp/release_notes.md

      - name: Publier la GitHub Release
        shell: bash -el {0}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "${TAG}" \
            --title "PBoule ${TAG}" \
            --notes-file /tmp/release_notes.md \
            pboule-documents-${TAG}.zip \
            documents/feuille_inscription.pdf \
            documents/poule_*.pdf

  # -------------------------------------------------------------------------
  # GitHub Pages — publie le site de documentation statique
  # Déclenché uniquement sur un tag semver strict (vX.Y.Z)
  # -------------------------------------------------------------------------
  pages:
    name: GitHub Pages
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: generate

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v5

      - name: Configurer l'environnement conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: pboule
          conda-remove-defaults: "true"

      - name: Télécharger les documents générés
        uses: actions/download-artifact@v7
        with:
          name: documents-generes
          path: documents/

      - name: Générer le site de documentation
        shell: bash -el {0}
        run: |
          python python/generate_pages.py \
            --docs-dir         documents \
            --output-dir       pages \
            --pboule-md        PBOULE.md \
            --changelog        CHANGELOG.md \
            --logo-creation-md creation_logo_petanque.md \
            --logo-yaml        logo.yaml

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Archiver le site pour GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/

      - id: deployment
        name: Déployer sur GitHub Pages
        uses: actions/deploy-pages@v4
